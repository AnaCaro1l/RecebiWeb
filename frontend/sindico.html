<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recebi - Painel do Síndico</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans flex h-screen overflow-hidden">
    
    <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-xl">
        <div class="p-6 text-2xl font-bold border-b border-slate-700 tracking-wider">
            Recebi
        </div>
        
        <nav class="flex-1 p-4 space-y-2 mt-4">
            <button id="menu-usuarios" class="w-full text-left px-4 py-3 rounded-lg bg-indigo-600 hover:bg-indigo-500 transition-colors font-medium">
                Gestão de Usuários
            </button>
            <button id="menu-logs" class="w-full text-left px-4 py-3 rounded-lg hover:bg-slate-800 text-slate-300 transition-colors font-medium">
                Logs de Auditoria
            </button>
        </nav>
        
        <div class="p-6 border-t border-slate-700 bg-slate-950">
            <p id="user-name" class="text-sm text-slate-400 mb-3 truncate"></p>
            <button id="btn-logout" class="w-full text-left px-4 py-2 text-sm text-red-400 hover:text-red-300 hover:bg-slate-900 rounded transition-colors border border-red-900">
                Sair do Sistema
            </button>
        </div>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto" id="main-content">
        <div class="flex justify-between items-center mb-8">
            <h2 id="titulo-pagina" class="text-3xl font-bold text-slate-800">Usuários do Sistema</h2>
            <button id="btn-novo-usuario" class="bg-indigo-600 text-white px-5 py-2 rounded-lg shadow hover:bg-indigo-700 transition">
                + Novo Usuário
            </button>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div id="tabela-container" class="p-6 text-center text-slate-500">
                Carregando dados...
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/sindico.js"></script>
</body>
</html>
