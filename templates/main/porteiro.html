{% extends 'main/base.html' %}

{% block title %}Recebi - Painel do Porteiro{% endblock %}

{% block body %}
<aside class="w-64 bg-[#f3f3f3] border-r border-slate-200 flex flex-col shadow-md">
    <div class="p-6 flex items-center mb-5 border-b border-slate-200">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="w-8 h-auto mr-3">
        <span class="text-xl font-bold text-[#333]">Recebi</span>
    </div>

    <nav class="flex-1 px-4 space-y-2 mt-2">
        <button id="menu-registrar"
            class="w-full text-left px-4 py-3 rounded-md bg-[#4a90e2] text-white font-medium transition-colors">
            Registrar Encomenda
        </button>
        <button id="menu-lista"
            class="w-full text-left px-4 py-3 rounded-md text-slate-600 hover:bg-slate-200 font-medium transition-colors">
            Lista de Encomendas
        </button>
    </nav>

    <div class="p-6 border-t border-slate-200 bg-white">
        <p id="user-name" class="text-sm font-bold text-slate-700 mb-1 truncate"></p>
        <p class="text-xs text-slate-500 mb-4">Portaria</p>
        <button id="btn-logout"
            class="w-full py-2 text-sm text-red-600 border border-red-200 rounded-md hover:bg-red-50 transition-colors">
            Sair do Sistema
        </button>
    </div>
</aside>

<main class="flex-1 p-8 overflow-y-auto relative" id="main-content">

    <section id="secao-registrar">
        <h2 class="text-2xl font-bold text-[#333] mb-8">Registrar Nova Encomenda</h2>

        <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-200 max-w-2xl">
            <form id="form-encomenda" class="space-y-5">

                <div class="relative">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Buscar Morador (Nome ou Apt)</label>
                    <input type="text" id="busca-morador" autocomplete="off" placeholder="Digite para buscar..."
                        class="w-full p-2.5 border border-slate-300 rounded-md text-sm outline-none focus:border-[#4a90e2] focus:ring-1 focus:ring-[#4a90e2]">

                    <ul id="lista-moradores"
                        class="absolute z-10 w-full bg-white border border-slate-200 rounded-md shadow-lg max-h-48 overflow-y-auto hidden mt-1">
                    </ul>
                    <input type="hidden" id="morador-id-selecionado">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Descrição do Pacote</label>
                    <input type="text" id="descricao" required placeholder="Ex: Caixa Amazon, Envelope Sedex..."
                        class="w-full p-2.5 border border-slate-300 rounded-md text-sm outline-none focus:border-[#4a90e2] focus:ring-1 focus:ring-[#4a90e2]">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Código de Rastreio (Opcional)</label>
                    <input type="text" id="rastreio" placeholder="Ex: AA123456789BR"
                        class="w-full p-2.5 border border-slate-300 rounded-md text-sm outline-none focus:border-[#4a90e2] focus:ring-1 focus:ring-[#4a90e2]">
                </div>

                <button type="submit" id="btn-salvar"
                    class="w-full p-2.5 mt-2 bg-[#4a90e2] text-white rounded-md font-medium hover:bg-[#357abd] transition-colors">
                    Registrar Recebimento
                </button>

                <div id="msg-feedback" class="hidden mt-3 text-center text-sm p-2 rounded"></div>
            </form>
        </div>
    </section>

    <section id="secao-lista" class="hidden">
        <h2 class="text-2xl font-bold text-[#333] mb-8">Encomendas Registradas</h2>
        <div class="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
            <div id="tabela-container" class="w-full overflow-x-auto">
            </div>
        </div>
    </section>

</main>

<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/porteiro.js') }}"></script>
{% endblock %}
