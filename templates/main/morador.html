{% extends 'main/base.html' %}

{% block title %}Recebi - Painel do Morador{% endblock %}

{% block body %}
<aside class="w-64 bg-[#f3f3f3] border-r border-slate-200 flex flex-col shadow-md">
    <div class="p-6 flex items-center mb-5 border-b border-slate-200">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="w-8 h-auto mr-3">
        <span class="text-xl font-bold text-[#333]">Recebi</span>
    </div>

    <nav class="flex-1 px-4 space-y-2 mt-2">
        <button
            class="w-full text-left px-4 py-3 rounded-md bg-[#4a90e2] text-white font-medium transition-colors cursor-default">
            Minhas Encomendas
        </button>
    </nav>

    <div class="p-6 border-t border-slate-200 bg-white">
        <p id="user-name" class="text-sm font-bold text-slate-700 mb-1 truncate"></p>
        <p id="user-apt" class="text-xs text-slate-500 mb-4"></p>
        <button id="btn-logout"
            class="w-full py-2 text-sm text-red-600 border border-red-200 rounded-md hover:bg-red-50 transition-colors">
            Sair do Sistema
        </button>
    </div>
</aside>

<main class="flex-1 p-8 overflow-y-auto relative">

    <div class="flex justify-between items-center mb-8">
        <h2 class="text-2xl font-bold text-[#333]">Minhas Encomendas</h2>
    </div>

    <div id="msg-feedback" class="hidden mb-6 text-center text-sm p-3 rounded"></div>

    <div class="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
        <div id="tabela-container" class="w-full overflow-x-auto">
            <p class="text-center text-slate-500 py-8">Buscando suas encomendas...</p>
        </div>
    </div>

</main>

<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/morador.js') }}"></script>
{% endblock %}
