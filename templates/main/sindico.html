{% extends 'main/base.html' %}

{% block title %}Recebi - Painel do Síndico{% endblock %}

{% block body %}
<aside class="w-64 bg-[#f3f3f3] border-r border-slate-200 flex flex-col shadow-md z-10">
    <div class="p-6 flex items-center mb-5 border-b border-slate-200">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="w-8 h-auto mr-3">
        <span class="text-xl font-bold text-[#333]">Recebi</span>
    </div>

    <nav class="flex-1 px-4 space-y-2 mt-2">
        <button id="menu-usuarios"
            class="w-full text-left px-4 py-3 rounded-md bg-[#4a90e2] text-white font-medium transition-colors">
            Gestão de Usuários
        </button>
        <button id="menu-logs"
            class="w-full text-left px-4 py-3 rounded-md text-slate-600 hover:bg-slate-200 font-medium transition-colors">
            Logs de Auditoria
        </button>
    </nav>

    <div class="p-6 border-t border-slate-200 bg-white">
        <p id="user-name" class="text-sm font-bold text-slate-700 mb-1 truncate"></p>
        <p class="text-xs text-slate-500 mb-4">Síndico</p>
        <button id="btn-logout"
            class="w-full py-2 text-sm text-red-600 border border-red-200 rounded-md hover:bg-red-50 transition-colors">
            Sair do Sistema
        </button>
    </div>
</aside>

<main class="flex-1 p-8 overflow-y-auto" id="main-content">
    <div class="flex justify-between items-center mb-8">
        <h2 id="titulo-pagina" class="text-2xl font-bold text-[#333]">Usuários do Sistema</h2>
        <button id="btn-novo-usuario"
            class="bg-[#4a90e2] text-white px-4 py-2 rounded-md shadow hover:bg-[#357abd] transition-colors text-sm font-medium">
            + Novo Usuário
        </button>
    </div>

<div id="container-filtros-usuarios" class="bg-white p-4 rounded-lg shadow-sm border border-slate-200 mb-6 flex flex-wrap gap-4 items-end">
        <div class="flex-1 min-w-[200px]">
            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Nome</label>
            <input type="text" id="filtro-user-nome" placeholder="Pesquisar nome..."
                class="w-full p-2 border border-slate-300 rounded-md text-sm outline-none focus:border-[#4a90e2]">
        </div>
        <div class="w-[120px]">
            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Apt</label>
            <input type="text" id="filtro-user-apt" placeholder="Nº..."
                class="w-full p-2 border border-slate-300 rounded-md text-sm outline-none focus:border-[#4a90e2]">
        </div>
        <div class="flex-1 min-w-[150px]">
            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Perfil</label>
            <select id="filtro-user-perfil" class="w-full p-2 border border-slate-300 rounded-md text-sm bg-white outline-none focus:border-[#4a90e2]">
                <option value="">Todos</option>
                <option value="Sindico">Síndico</option>
                <option value="Morador">Morador</option>
                <option value="Porteiro">Porteiro</option>
            </select>
        </div>
        <div class="flex-1 min-w-[150px]">
            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Status</label>
            <select id="filtro-user-status" class="w-full p-2 border border-slate-300 rounded-md text-sm bg-white outline-none focus:border-[#4a90e2]">
                <option value="Ambos">Ambos</option>
                <option value="Ativo">Ativo</option>
                <option value="Inativo">Inativo</option>
            </select>
        </div>
        <div class="flex gap-2">
            <button id="btn-limpar-user-filtros" 
                class="px-4 py-2 text-sm text-slate-600 border border-slate-300 rounded-md hover:bg-slate-50 font-medium transition-colors">
                Limpar
            </button>
        </div>
    </div>

    <div id="container-filtros-logs" class="bg-white p-4 rounded-lg shadow-sm border border-slate-200 mb-6 flex flex-wrap gap-4 items-end hidden">
        <div class="flex-1 min-w-[200px]">
            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Filtrar por Data</label>
            <input type="date" id="filtro-log-data" 
                class="w-full p-2 border border-slate-300 rounded-md text-sm outline-none focus:border-[#4a90e2]">
        </div>
        <div class="flex-2 min-w-[250px] flex-1">
            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Responsável</label>
            <input type="text" id="filtro-log-responsavel" placeholder="Nome do responsável..."
                class="w-full p-2 border border-slate-300 rounded-md text-sm outline-none focus:border-[#4a90e2]">
        </div>
        <div class="flex gap-2">
            <button id="btn-limpar-log-filtros" 
                class="px-4 py-2 text-sm text-slate-600 border border-slate-300 rounded-md hover:bg-slate-50 font-medium transition-colors">
                Limpar
            </button>
        </div>
    </div>

    <div class="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
        <div id="tabela-container" class="w-full overflow-x-auto">
            <p class="text-center text-slate-500 py-8">Carregando dados...</p>
        </div>
        
<div id="paginacao-logs-container" class="px-6 py-4 bg-slate-50 border-t border-slate-200 flex items-center justify-between hidden">
            <span class="text-sm text-slate-600" id="texto-paginas-logs">
                Página 0 de 0
            </span>
            <div class="inline-flex gap-2">
                <button id="btn-log-anterior" disabled
                    class="px-3 py-1.5 text-sm font-medium text-slate-700 bg-white border border-slate-300 rounded-md hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                    Anterior
                </button>
                <button id="btn-log-proximo" disabled
                    class="px-3 py-1.5 text-sm font-medium text-slate-700 bg-white border border-slate-300 rounded-md hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                    Próximo
                </button>
            </div>
        </div>
    </div>

</main>

<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/sindico.js') }}"></script>
{% endblock %}
