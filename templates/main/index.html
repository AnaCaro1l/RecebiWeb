{% extends 'main/base.html' %}

{% block title %}Recebi - Gestão de Encomendas{% endblock %}

{% block body %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const token = localStorage.getItem('token');

        if (!token) {
            window.location.href = '/login';
        } else {
            try {
                const usuario = JSON.parse(localStorage.getItem('usuario'));
                if (!usuario || !usuario.TipoUsuario) {
                    throw new Error('Tipo de usuário não encontrado');
                }

                const tipoUsuario = usuario.TipoUsuario.toLowerCase();

                if (tipoUsuario === 'morador') {
                    window.location.href = '/morador.html';
                } else if (tipoUsuario === 'porteiro') {
                    window.location.href = '/porteiro.html';
                } else if (tipoUsuario === 'sindico') {
                    window.location.href = '/sindico.html';
                } else {
                    localStorage.clear();
                    window.location.href = '/login';
                }
            } catch (error) {
                localStorage.clear();
                window.location.href = '/login';
            }
        }
    });
</script>

<div class="h-screen flex items-center justify-center bg-slate-100">
    <div class="text-center">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto mb-4"></div>
        <p class="text-slate-600">Carregando...</p>
    </div>
</div>
{% endblock %}
