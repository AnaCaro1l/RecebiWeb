{# Jinja macros for reusable elements #}

{% macro render_field(name, label, placeholder="", type="text", value="") %}
<div class="mb-4">
    <label class="block text-slate-700 text-sm font-semibold mb-2" for="{{ name }}">
        {{ label }}
    </label>
    <input class="shadow appearance-none border rounded w-full py-2 px-3 text-slate-700 leading-tight focus:outline-none focus:ring focus:ring-indigo-200" 
           id="{{ name }}" 
           type="{{ type }}" 
           placeholder="{{ placeholder }}" 
           value="{{ value }}">
</div>
{% endmacro %}
